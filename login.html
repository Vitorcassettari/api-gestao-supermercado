<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Supermercado</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f4; }
        .login-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #218838; }
        #mensagem { margin-top: 15px; color: red; font-size: 14px; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Acesso ao Sistema</h2>
        <input type="email" id="email" placeholder="Digite seu email" required>
        <input type="password" id="senha" placeholder="Digite sua senha" required>
        <button onclick="fazerLogin()">Entrar</button>
        <div id="mensagem"></div>
    </div>

    <script>
        async function fazerLogin() {
            // Pega o que o usuário digitou nas caixinhas
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            const mensagem = document.getElementById('mensagem');

            mensagem.style.color = 'blue';
            mensagem.innerText = 'Conectando...';

            try {
                // O fetch é o requests.post do JavaScript!
                const response = await fetch('http://127.0.0.1:5000/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, password: senha }) // Transforma em JSON
                });

                const data = await response.json(); // Lê a resposta da API

                if (response.status === 200) {
                    mensagem.style.color = 'green';
                    mensagem.innerText = data.msg;

                    // 🟢 A MÁGICA: Guardando o Token e a Permissão no "bolso" do navegador!
                    localStorage.setItem('meu_token', data.token);
                    localStorage.setItem('minha_permissao', data.permissoes);

                    // Redireciona o usuário dependendo de quem ele é
                    setTimeout(() => {
                        if (data.permissoes === 'admin') {
                            window.location.href = 'admin.html'; // Manda pro painel do chefe
                        } else {
                            window.location.href = 'usuario.html'; // Manda pra vitrine
                        }
                    }, 1000); // Espera 1 segundo e muda de página

                } else {
                    mensagem.style.color = 'red';
                    mensagem.innerText = data.erro || 'Erro ao fazer login';
                }
            } catch (error) {
                mensagem.style.color = 'red';
                mensagem.innerText = 'Erro ao conectar com a API. Ela está ligada?';
            }
        }
    </script>
</body>
</html>
